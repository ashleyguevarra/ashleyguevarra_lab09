services:
  yugabyte1:
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte1
    command: >
      bash -c "/home/yugabyte/bin/yugabyted start --advertise_address=yugabyte1 --tserver_flags=ysql_enable_auth=false --daemon=false --base_dir=/home/yugabyte/var"
    ports:
      # Host 17000 if 7000 is already in use (e.g. another app). UI: http://localhost:17000
      - "17000:7000"   # yb-master UI (container still listens on 7000)
      - "9000:9000"   # yb-tserver UI
      - "5433:5433"   # YSQL
      - "9042:9042"   # YCQL
    volumes:
      - yugabyte_data1:/home/yugabyte/var
    networks:
      - labo09-network
    # Pas de healthcheck : sur Docker Desktop il reste souvent "unhealthy" alors que YSQL
    # fonctionne, ce qui bloquait yugabyte2/3 (depends_on: healthy). db-init attend YSQL
    # dans entrypoint.sh ; y2/y3 attendent l’UI master ci-dessous avant --join.

  yugabyte2:
    profiles: ["cluster"]
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte2
    command: >
      bash -c "until curl -sf http://yugabyte1:7000/ >/dev/null 2>&1; do sleep 3; done;
      /home/yugabyte/bin/yugabyted start --advertise_address=yugabyte2 --join=yugabyte1 --daemon=false --base_dir=/home/yugabyte/var"
    volumes:
      - yugabyte_data2:/home/yugabyte/var
    depends_on:
      yugabyte1:
        condition: service_started
    networks:
      - labo09-network

  yugabyte3:
    profiles: ["cluster"]
    image: yugabytedb/yugabyte:latest
    container_name: yugabyte3
    command: >
      bash -c "until curl -sf http://yugabyte1:7000/ >/dev/null 2>&1; do sleep 3; done;
      /home/yugabyte/bin/yugabyted start --advertise_address=yugabyte3 --join=yugabyte1 --daemon=false --base_dir=/home/yugabyte/var"
    volumes:
      - yugabyte_data3:/home/yugabyte/var
    depends_on:
      yugabyte1:
        condition: service_started
    networks:
      - labo09-network

  db-init:
    image: yugabytedb/yugabyte:latest
    container_name: db_init
    volumes:
      - ./db-init:/db-init
    entrypoint: ["bash", "/db-init/entrypoint.sh"]
    depends_on:
      yugabyte1:
        condition: service_started
    networks:
      - labo09-network

  python-app:
    build: .
    container_name: python_app
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      # Host 5001: macOS often reserves 5000 (AirPlay). API: http://localhost:5001
      - "5001:5000"
    env_file:
      - .env
    networks:
      - labo09-network
    restart: "no"

  locust:
    image: locustio/locust:latest
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locustfiles:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --host=http://python-app:5000
    depends_on:
      - python-app
    networks:
      - labo09-network

networks:
  labo09-network:
    driver: bridge

volumes:
  yugabyte_data1:
  yugabyte_data2:
  yugabyte_data3:
